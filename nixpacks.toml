[variables]
VITE_API_URL = "/api"
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.build]
cmds = [
  "npm install --prefix frontend",
  "npm run build --prefix frontend",
  "mkdir -p backend/public",
  "cp -r frontend/dist/. backend/public/",
  "npm install --prefix backend --production"
]

[start]
cmd = "node backend/server.js"
